<!doctype html>
<html>
<head>
    <meta charset="utf-8">
    <title>Lottie Hover Test</title>
    <!-- 1. CORRECT SCRIPT FOR <lottie-player> -->
 
</head>

<body>
    <div id="lottie-container" style="width: 300px; height: 300px;"></div>
	
	<script src="https://cdnjs.cloudflare.com/ajax/libs/bodymovin/5.7.4/lottie.min.js"></script>
	

	<script>
    var animation = bodymovin.loadAnimation({
        container: document.getElementById('lottie-container'), // required
        path: 'data.json', // required
        renderer: 'svg', // required
        loop: false, // optional: set to false so it plays once per hover
        autoplay: false, // optional: set to false to control manually
        name: "Hover Animation", // optional
    });

    // Add event listeners to the container
    const container = document.getElementById('lottie-container');

    container.addEventListener('mouseenter', () => {
        animation.play(); // Start the animation
    });

    container.addEventListener('mouseleave', () => {
        animation.stop(); // Stop/reset the animation on mouse out
    });
</script>

</body>
</html>
